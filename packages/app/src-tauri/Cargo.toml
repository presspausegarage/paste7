[package]
name = "paste7-shell"
version = "0.1.0"
description = "paste7 Tauri shell"
authors = ["paste7 contributors"]
edition = "2021"
rust-version = "1.77"
license = "MIT"

[lib]
name = "paste7_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [] }
tauri-plugin-dialog = "2.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
windows = { version = "0.61.3", features = ["Win32_Security_Cryptography", "Win32_Foundation"] }

[features]
# By default, Tauri runs in production mode.
# Use `npm run tauri dev` to enable dev features.
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
